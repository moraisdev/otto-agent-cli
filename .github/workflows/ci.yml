name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - "docs/**"
      - "site/**"
      - ".otto/**"
      - "examples/**"
      - "extensions/**"
      - ".claude-plugin/**"
      - ".markdownlint.jsonc"
      - ".githooks/**"
      - ".github/workflows/docs.yml"
      - ".github/workflows/site.yml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "Makefile"
      - ".env.example"
      - "LICENSE"
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
